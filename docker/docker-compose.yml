version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: genome-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models/checkpoints:/app/models/checkpoints
      - ../results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: genome-dashboard
    command: ["python", "main.py", "dashboard"]
    ports:
      - "8050:8050"
    volumes:
      - ../data:/app/data
      - ../models/checkpoints:/app/models/checkpoints
      - ../results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    restart: unless-stopped
